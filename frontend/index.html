<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Music Player</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<header>
  <h1>🎵 Local Music Player</h1>
  <div style="display:flex;gap:8px">
    <button id="settings-badge" class="syncthing-badge" title="設定を開く">設定</button>
    <button id="syncthing-badge" class="syncthing-badge" title="Syncthing 設定を開く">Syncthing</button>
  </div>
</header>

<!-- Mobile tab bar -->
<nav class="tab-bar">
  <button class="tab-btn active" data-panel="left-panel">Queue</button>
  <button class="tab-btn" data-panel="playlists-panel">Playlists</button>
  <button class="tab-btn" data-panel="right-panel">Library</button>
</nav>

<div class="layout">
  <!-- LEFT: URL manager + download queue -->
  <div class="panel left-panel active" id="left-panel">

    <div class="section-title" style="margin-bottom:12px">Add YouTube URL</div>
    <form class="add-url-form" id="add-url-form">
      <input type="text" name="url" placeholder="https://youtube.com/watch?v=..." required autocomplete="off">
      <div class="format-row">
        <select name="audio_format">
          <option value="mp3">MP3</option>
          <option value="flac">FLAC</option>
          <option value="aac">AAC</option>
          <option value="ogg">OGG</option>
        </select>
        <select name="audio_quality">
          <option value="192">192 kbps</option>
          <option value="320">320 kbps</option>
          <option value="best">Best</option>
        </select>
      </div>
      <button class="btn btn-primary" type="submit">+ Add &amp; Download</button>
      <div class="error-msg" id="url-error"></div>
    </form>

    <div class="section-title" style="margin-top:18px">Registered URLs</div>
    <div class="url-list" id="url-list"><div class="empty-state">No URLs registered</div></div>

    <div class="section-title" style="margin-top:18px">Download Queue</div>
    <div class="queue-list" id="job-list"><div class="empty-state">No active downloads</div></div>

  </div>

  <!-- CENTER: YouTube Playlist Sync -->
  <div class="panel playlists-panel" id="playlists-panel">

    <div class="section-title">YouTubeアカウント</div>
    <div id="yt-auth-section" class="yt-auth-section">
      <div class="empty-state">読込中…</div>
    </div>

    <div id="yt-playlist-picker" style="display:none">
      <div class="section-title" style="margin-top:18px">アカウントのプレイリスト</div>
      <div id="yt-account-playlists" class="yt-account-playlists">
        <div class="empty-state">読込中…</div>
      </div>
    </div>

    <div class="section-title" style="margin-top:18px">同期中のプレイリスト</div>
    <div id="yt-sync-list" class="yt-sync-list">
      <div class="empty-state">同期中のプレイリストはありません</div>
    </div>

  </div>

  <!-- RIGHT: Track library -->
  <div class="panel right-panel" id="right-panel">

    <div class="library-toolbar">
      <input type="search" id="search-input" placeholder="Search tracks…">
    </div>

    <div class="track-grid" id="track-grid">
      <div class="empty-state">No tracks yet</div>
    </div>

  </div>
</div>

<div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
  <div class="modal-backdrop" data-close-settings-modal></div>
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="settings-modal-title">アプリ設定</h2>
      <button class="modal-close" data-close-settings-modal aria-label="閉じる">✕</button>
    </div>
    <div class="modal-body">
      <form id="settings-form" class="syncthing-config-form">
        <label class="syncthing-field">
          <span>URLキュー自動同期間隔</span>
          <select name="url_sync_interval_minutes" id="settings-url-sync-interval">
            <option value="0">手動のみ</option>
            <option value="15">15分</option>
            <option value="30">30分</option>
            <option value="60">1時間</option>
            <option value="180">3時間</option>
            <option value="360">6時間</option>
            <option value="720">12時間</option>
            <option value="1440">24時間</option>
          </select>
        </label>
        <label class="syncthing-field">
          <span>YouTubeプレイリスト自動同期間隔</span>
          <select name="youtube_sync_interval_minutes" id="settings-youtube-sync-interval">
            <option value="0">手動のみ</option>
            <option value="15">15分</option>
            <option value="30">30分</option>
            <option value="60">1時間</option>
            <option value="180">3時間</option>
            <option value="360">6時間</option>
            <option value="720">12時間</option>
            <option value="1440">24時間</option>
          </select>
        </label>
        <label class="syncthing-field">
          <span>ダウンロード音量ゲイン（%）</span>
          <input type="number" min="0" step="0.1" name="download_gain_percent" placeholder="例: 20">
        </label>
        <div class="syncthing-config-actions">
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
        <div class="error-msg" id="settings-error"></div>
        <div class="success-msg" id="settings-ok"></div>
      </form>
    </div>
  </div>
</div>

<!-- Syncthing settings modal -->
<div id="syncthing-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="syncthing-modal-title">
  <div class="modal-backdrop" data-close-modal></div>
  <div class="modal-content" id="syncthing-panel">
    <div class="modal-header">
      <h2 id="syncthing-modal-title">Syncthing 設定</h2>
      <button class="modal-close" data-close-modal aria-label="閉じる">✕</button>
    </div>
    <div class="modal-body">
      <div id="syncthing-config-state" class="syncthing-config-state">読込中…</div>

      <form class="syncthing-config-form" id="syncthing-config-form">
        <label class="syncthing-field">
          <span>URL</span>
          <input type="url" name="url" placeholder="http://localhost:8384" required autocomplete="off">
        </label>
        <label class="syncthing-field">
          <span>API キー</span>
          <input type="password" name="api_key" placeholder="API キー" autocomplete="off">
        </label>
        <div class="syncthing-config-actions">
          <button type="button" class="btn btn-ghost" id="syncthing-test-btn">接続テスト</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
        <div class="error-msg" id="syncthing-config-error"></div>
        <div class="success-msg" id="syncthing-config-ok"></div>
      </form>

      <div class="section-title syncthing-section-title">
        <span>共有フォルダ</span>
        <button class="btn btn-ghost" id="syncthing-refresh-btn" title="再読込">↻</button>
      </div>
      <div id="syncthing-folder-list" class="syncthing-list">
        <div class="empty-state">読込中…</div>
      </div>

      <div class="section-title syncthing-section-title"><span>デバイス</span></div>
      <div id="syncthing-device-list" class="syncthing-list">
        <div class="empty-state">読込中…</div>
      </div>
    </div>
  </div>
</div>

<!-- Player bar (fixed bottom) -->
<div id="player-bar" class="hidden">
  <img class="player-thumb" src="" alt="">
  <div class="player-info">
    <div class="player-title">—</div>
    <div class="player-artist"></div>
  </div>
  <div class="player-seek">
    <span class="player-time current-time">0:00</span>
    <input type="range" class="seek-range" min="0" max="100" value="0">
    <span class="player-time duration">0:00</span>
  </div>
  <div class="player-controls">
    <button class="ctrl-btn shuffle" title="シャッフル">🔀</button>
    <button class="ctrl-btn prev" title="Previous">⏮</button>
    <button class="ctrl-btn play-pause" title="Play/Pause">▶</button>
    <button class="ctrl-btn next" title="Next">⏭</button>
    <button class="ctrl-btn repeat" title="リピート">🔁</button>
  </div>
  <div class="volume-control">
    <span class="volume-icon">🔊</span>
    <input type="range" class="volume-range" min="0" max="100" value="100" title="音量">
  </div>
</div>

<script type="module">
  import { initQueue } from "/js/queue.js";
  import { initLibrary } from "/js/library.js";
  import { initPlaylists } from "/js/playlists.js";
  import { initSyncthing } from "/js/syncthing.js";
  import { initSettings } from "/js/settings.js";

  initQueue();
  initLibrary();
  initPlaylists();
  initSyncthing();
  initSettings();

  // Mobile tabs
  document.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.panel).classList.add("active");
    });
  });

  // Syncthing status badge
  async function updateSyncthingBadge() {
    try {
      const { api } = await import("/js/api.js");
      const status = await api.syncthingStatus();
      const badge = document.getElementById("syncthing-badge");
      if (!status.available) {
        badge.textContent = "Syncthing: off";
        badge.className = "syncthing-badge";
      } else if (status.syncing) {
        badge.textContent = "Syncing…";
        badge.className = "syncthing-badge syncing";
      } else {
        badge.textContent = `Synced ${Math.round(status.completion_pct || 100)}%`;
        badge.className = "syncthing-badge ok";
      }
    } catch {}
  }
  updateSyncthingBadge();
  setInterval(updateSyncthingBadge, 30000);

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }
</script>
</body>
</html>
