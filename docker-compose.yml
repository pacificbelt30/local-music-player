version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  syncthing-init:
    image: busybox
    command: sh -c "chown -R 1000:1000 /var/syncthing/config /var/syncthing/downloads"
    volumes:
      - ./syncthing-config:/var/syncthing/config
      - ./downloads:/var/syncthing/downloads

  syncthing:
    image: syncthing/syncthing:latest
    hostname: music-syncthing
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - STGUIADDRESS=0.0.0.0:8384
      - STGUIAPIKEY=${SYNCTHING_API_KEY:-please-change-this-syncthing-api-key}
    ports:
      - "8384:8384"        # Web GUI / REST API
      - "22000:22000/tcp"  # TCP file transfers
      - "22000:22000/udp"  # QUIC file transfers
      - "21027:21027/udp"  # Local discovery broadcasts
    volumes:
      - ./syncthing-config:/var/syncthing/config
      - ./downloads:/var/syncthing/downloads
    depends_on:
      syncthing-init:
        condition: service_completed_successfully

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=sqlite:////data/music.db
      - DOWNLOADS_PATH=/downloads
      - DATA_PATH=/data
      - SYNCTHING_URL=http://syncthing:8384
    volumes:
      - ./downloads:/downloads
      - ./data:/data
      - ./frontend:/app/frontend:ro
    depends_on:
      - redis
      - syncthing
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=sqlite:////data/music.db
      - DOWNLOADS_PATH=/downloads
      - DATA_PATH=/data
      - SYNCTHING_URL=http://syncthing:8384
    volumes:
      - ./downloads:/downloads
      - ./data:/data
    depends_on:
      - redis
      - syncthing
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info -Q downloads,scheduler

  beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=sqlite:////data/music.db
      - DOWNLOADS_PATH=/downloads
      - DATA_PATH=/data
    volumes:
      - ./data:/data
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info

volumes:
  redis-data:
